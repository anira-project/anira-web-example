<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 790 226" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#fff"/>
    </marker>
  </defs>

  <g fill="none" stroke="#fff" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <!-- Boxes -->
    <rect x="10"  y="129" width="78"  height="32" rx="4"/>  <!-- source -->
    <rect x="160" y="14"  width="210" height="32" rx="4"/>  <!-- dryDelay -->
    <rect x="390" y="14"  width="90"  height="32" rx="4"/>  <!-- dryGain -->
    <rect x="160" y="129" width="100" height="32" rx="4"/>  <!-- inputGain -->
    <rect x="305" y="79"  width="120" height="32" rx="4"/>  <!-- RAVE · Funk -->
    <rect x="305" y="179" width="140" height="32" rx="4"/>  <!-- RAVE · Djembe -->
    <rect x="445" y="79"  width="80"  height="32" rx="4"/>  <!-- fadeGain1 -->
    <rect x="465" y="179" width="80"  height="32" rx="4"/>  <!-- fadeGain2 -->
    <rect x="595" y="129" width="80"  height="32" rx="4"/>  <!-- wetGain -->
    <rect x="720" y="129" width="60"  height="32" rx="4"/>  <!-- dest -->

    <!-- source → tee1 -->
    <line x1="88"  y1="145" x2="130" y2="145" marker-end="url(#arrow)"/>

    <!-- tee1 → dry top branch -->
    <line x1="130" y1="145" x2="130" y2="30"/>
    <line x1="130" y1="30"  x2="160" y2="30"  marker-end="url(#arrow)"/>

    <!-- dryDelay → dryGain -->
    <line x1="370" y1="30"  x2="390" y2="30"  marker-end="url(#arrow)"/>

    <!-- dryGain → join -->
    <line x1="480" y1="30"  x2="700" y2="30"/>
    <line x1="700" y1="30"  x2="700" y2="145"/>

    <!-- tee1 → inputGain -->
    <line x1="130" y1="145" x2="160" y2="145" marker-end="url(#arrow)"/>

    <!-- inputGain → split -->
    <line x1="260" y1="145" x2="285" y2="145" marker-end="url(#arrow)"/>
    <line x1="285" y1="95"  x2="285" y2="195"/>
    <line x1="285" y1="95"  x2="305" y2="95"  marker-end="url(#arrow)"/>
    <line x1="285" y1="195" x2="305" y2="195" marker-end="url(#arrow)"/>

    <!-- RAVE · Funk → fadeGain1 -->
    <line x1="425" y1="95"  x2="445" y2="95"  marker-end="url(#arrow)"/>

    <!-- RAVE · Djembe → fadeGain2 -->
    <line x1="445" y1="195" x2="465" y2="195" marker-end="url(#arrow)"/>

    <!-- fadeGain1, fadeGain2 → merge → wetGain -->
    <line x1="525" y1="95"  x2="570" y2="95"/>
    <line x1="545" y1="195" x2="570" y2="195"/>
    <line x1="570" y1="95"  x2="570" y2="195"/>
    <line x1="570" y1="145" x2="595" y2="145" marker-end="url(#arrow)"/>

    <!-- wetGain → join -->
    <line x1="675" y1="145" x2="700" y2="145"/>

    <!-- join → dest -->
    <line x1="700" y1="145" x2="720" y2="145" marker-end="url(#arrow)"/>
  </g>

  <!-- Tee / join dots -->
  <g fill="#fff">
    <circle cx="130" cy="145" r="2.5"/>  <!-- source splits dry/wet -->
    <circle cx="285" cy="145" r="2.5"/>  <!-- inputGain fans out -->
    <circle cx="700" cy="145" r="2.5"/>  <!-- dry + wet join -->
  </g>

  <!-- Labels -->
  <g fill="#fff" text-anchor="middle" dominant-baseline="middle">
    <text x="49"  y="145">source</text>
    <text x="265" y="30">dryDelay (latency match)</text>
    <text x="435" y="30">dryGain</text>
    <text x="210" y="145">inputGain</text>
    <text x="365" y="95">RAVE · Funk</text>
    <text x="375" y="195">RAVE · Djembe</text>
    <text x="485" y="95">fadeGain1</text>
    <text x="505" y="195">fadeGain2</text>
    <text x="635" y="145">wetGain</text>
    <text x="750" y="145">dest</text>
  </g>
</svg>
